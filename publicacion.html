<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1, width=device-width" />
  <title>Publicación — Alerta Patitas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Onest:wght@400;500;600;700&family=Oleo+Script:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="home.css" />
  <link rel="stylesheet" href="auth.css" />
  <style>
    /* ── Página de detalle ── */
    .pub-wrapper {
      max-width: 900px;
      margin: 2.5rem auto 4rem;
      padding: 0 1.25rem;
    }

    .pub-back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #8b4513;
      font-family: var(--font-onest, 'Onest', sans-serif);
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      margin-bottom: 1.5rem;
      transition: opacity 0.2s;
    }
    .pub-back:hover { opacity: 0.7; }

    .pub-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      overflow: hidden;
    }

    /* Cabecera con imagen */
    .pub-hero {
      position: relative;
      width: 100%;
      max-height: 420px;
      overflow: hidden;
      background: #f6f2ed;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pub-hero img {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
      display: block;
    }
    .pub-hero-placeholder {
      width: 100%;
      min-height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: #aaa;
      font-size: 3rem;
    }
    .pub-hero-placeholder small {
      font-size: 0.9rem;
      font-family: var(--font-onest, 'Onest', sans-serif);
    }

    /* Badge de estado */
    .pub-badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      padding: 0.3rem 0.9rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.85rem;
      font-family: var(--font-fredoka, 'Fredoka', sans-serif);
      letter-spacing: 0.03em;
    }
    .pub-badge--lost    { background: #ff6b6b; color: #fff; }
    .pub-badge--search  { background: #4caf7d; color: #fff; }

    /* Galería de miniaturas */
    .pub-thumbs {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: #faf6f2;
      overflow-x: auto;
      border-bottom: 1px solid #ede8e2;
    }
    .pub-thumb {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }
    .pub-thumb:hover,
    .pub-thumb.active { border-color: #8b4513; }

    /* Contenido principal */
    .pub-body {
      padding: 2rem 2.5rem;
    }
    @media (max-width: 600px) {
      .pub-body { padding: 1.25rem 1.25rem; }
    }

    .pub-title {
      font-family: var(--font-fredoka, 'Fredoka', sans-serif);
      font-size: 2rem;
      font-weight: 700;
      color: #3a1f0d;
      margin: 0 0 0.75rem;
    }

    .pub-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1.5rem;
    }
    .pub-tag {
      background: #f6ede4;
      color: #8b4513;
      border-radius: 50px;
      padding: 0.25rem 0.85rem;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: var(--font-onest, 'Onest', sans-serif);
    }
    .pub-tag--estado-perdido  { background: #ffe0e0; color: #c0392b; }
    .pub-tag--estado-buscando { background: #d6f5e3; color: #27ae60; }

    .pub-divider {
      border: none;
      border-top: 1px solid #ede8e2;
      margin: 1.25rem 0;
    }

    .pub-section-title {
      font-family: var(--font-fredoka, 'Fredoka', sans-serif);
      font-size: 1.05rem;
      color: #8b4513;
      font-weight: 600;
      margin: 0 0 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .pub-desc {
      font-family: var(--font-onest, 'Onest', sans-serif);
      color: #555;
      font-size: 0.97rem;
      line-height: 1.65;
      margin: 0;
      white-space: pre-wrap;
    }

    .pub-info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .pub-info-item {
      background: #faf6f2;
      border-radius: 12px;
      padding: 0.75rem 1rem;
    }
    .pub-info-label {
      font-family: var(--font-fredoka, 'Fredoka', sans-serif);
      font-size: 0.75rem;
      color: #b07040;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.2rem;
    }
    .pub-info-value {
      font-family: var(--font-onest, 'Onest', sans-serif);
      font-size: 0.97rem;
      font-weight: 600;
      color: #3a1f0d;
    }

    /* Estado vacío / error */
    .pub-error {
      text-align: center;
      padding: 4rem 1rem;
      font-family: var(--font-onest, 'Onest', sans-serif);
      color: #888;
    }
    .pub-error span { font-size: 3rem; display: block; margin-bottom: 0.75rem; }

    /* ── Botón editar (solo visible al dueño de la publicación) ── */
    .pub-edit-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 0.75rem;
    }
    .btn-pub-edit {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.3rem;
      border-radius: 50px;
      background: linear-gradient(135deg, #c8a040, #8b4513);
      color: #fff;
      font-family: var(--font-fredoka, 'Fredoka', sans-serif);
      font-weight: 700;
      font-size: 0.88rem;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-pub-edit:hover { opacity: 0.88; transform: translateY(-1px); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-topbar"></div>
    <nav class="header-nav">
      <a href="home.html" class="logo">
        <div class="logo-icon">🐾</div>
        <span class="logo-text">Alerta Patitas</span>
      </a>
      <ul class="nav-links">
        <li class="nav-item"><a href="home.html">Inicio</a></li>
        <li class="nav-item"><a href="#">Acerca de nosotros</a></li>
      </ul>
      <div class="nav-actions">
        <div class="login-wrapper">
          <button class="btn-login">Iniciar Sesión</button>
          <div class="login-dropdown">
            <a href="login.html" class="login-opt login-opt--primary">
              <span class="lopt-icon">👤</span>
              <div><strong>Iniciar Sesión</strong><small>Accede a tu cuenta</small></div>
            </a>
            <div class="login-divider"></div>
            <a href="registro.html" class="login-opt">
              <span class="lopt-icon">📝</span>
              <div><strong>Registrarse</strong><small>Crea una cuenta nueva</small></div>
            </a>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <!-- CONTENIDO -->
  <div class="pub-wrapper">
    <a href="home.html" class="pub-back">← Volver a todas las publicaciones</a>
    <div class="pub-card" id="pubCard">
      <div class="pub-error">
        <span>🐾</span>
        <p>Cargando publicación…</p>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-logo">
        <span class="logo-icon">🐾</span>
        <span class="logo-text">Alerta Patitas</span>
      </div>
      <p class="footer-copy">© 2025 Alerta Patitas — Ayudando a reunir familias con sus mascotas.</p>
    </div>
  </footer>

  <script src="auth.js"></script>
  <script>
    (function () {
      const card = document.getElementById('pubCard');

      /* ── Leer datos desde la URL ── */
      const params = new URLSearchParams(window.location.search);
      const raw = params.get('datos');

      if (!raw) {
        card.innerHTML = `
          <div class="pub-error">
            <span>🐾</span>
            <p>No se encontró la publicación.</p>
            <small>Vuelve al inicio y selecciona una mascota.</small>
          </div>`;
        return;
      }

      let item;
      try {
        item = JSON.parse(decodeURIComponent(raw));
      } catch (e) {
        card.innerHTML = `
          <div class="pub-error">
            <span>⚠️</span>
            <p>Los datos de esta publicación no son válidos.</p>
          </div>`;
        return;
      }

      /* ── Helpers ── */
      function esc(str) {
        const d = document.createElement('div');
        d.textContent = String(str || '');
        return d.innerHTML;
      }

      function capitalize(str) {
        return str ? str.charAt(0).toUpperCase() + str.slice(1) : '';
      }

      /* ── Parsear fotos ── */
      const fotos = (item.fotos || '').split('|').map(s => s.trim()).filter(Boolean);
      const fotoActiva = fotos[0] || null;

      /* ── Badge de estado ── */
      const estadoNorm = String(item.estado || '').trim().toLowerCase();
      const estadoLabel = estadoNorm === 'buscando' ? 'Buscando' : 'Perdido';
      const badgeClass  = estadoNorm === 'buscando' ? 'pub-badge--search' : 'pub-badge--lost';

      /* ── Etiquetas de info ── */
      const edadMap = { cachorro: 'Cachorro', corta: 'De corta edad', adulto: 'Adulto', senior: 'Senior' };
      const edadLabel = edadMap[String(item.edad || '').toLowerCase()] || capitalize(item.edad) || '—';

      /* ── Imagen principal ── */
      const heroHTML = fotoActiva
        ? `<img src="${esc(fotoActiva)}" alt="${esc(item.nombre || 'Mascota')}" id="heroImg" />`
        : `<div class="pub-hero-placeholder"><span>📷</span><small>Sin fotos disponibles</small></div>`;

      /* ── Miniaturas ── */
      const thumbsHTML = fotos.length > 1
        ? `<div class="pub-thumbs">
            ${fotos.map((f, i) => `
              <img
                src="${esc(f)}"
                alt="Foto ${i + 1}"
                class="pub-thumb${i === 0 ? ' active' : ''}"
                data-src="${esc(f)}"
              />`).join('')}
           </div>`
        : '';

      /* ── Descripción ── */
      const descHTML = item.descripcion
        ? `<hr class="pub-divider" />
           <p class="pub-section-title">Descripción</p>
           <p class="pub-desc">${esc(item.descripcion)}</p>`
        : '';

      /* ── Zona / Ubicación ── */
      const zonaHTML = item.zona || item.ubicacion || item.lugar
        ? `<div class="pub-info-item">
             <div class="pub-info-label">Zona</div>
             <div class="pub-info-value">${esc(item.zona || item.ubicacion || item.lugar)}</div>
           </div>`
        : '';

      /* ── Contacto ── */
      const contactoHTML = item.contacto || item.telefono || item.email
        ? `<hr class="pub-divider" />
           <p class="pub-section-title">Contacto</p>
           <p class="pub-desc">${esc(item.contacto || item.telefono || item.email)}</p>`
        : '';

      /* ── Botón "Editar publicación" — solo visible si el
         usuario logueado es el autor de esta publicación ── */
      let editBarHTML = '';
      try {
        const sesionRaw = localStorage.getItem('alertaPatitas_usuario');
        const sesion = sesionRaw ? JSON.parse(sesionRaw) : null;
        const correoAutor = String(item.autor_correo || '').trim().toLowerCase();

        if (sesion && correoAutor && sesion.correo.trim().toLowerCase() === correoAutor) {
          editBarHTML = `
            <div class="pub-edit-bar">
              <a href="editor1.html?id=${esc(item.id)}" class="btn-pub-edit">✏️ Editar publicación</a>
            </div>`;
        }
      } catch (err) {
        editBarHTML = '';
      }

      /* ── Render completo ── */
      card.innerHTML = `
        ${editBarHTML}
        <div class="pub-hero">
          ${heroHTML}
          <span class="pub-badge ${badgeClass}">${estadoLabel}</span>
        </div>
        ${thumbsHTML}
        <div class="pub-body">
          <h1 class="pub-title">${esc(item.nombre || 'Sin nombre')}</h1>
          <div class="pub-tags">
            <span class="pub-tag">${esc(capitalize(item.mascota || 'Mascota'))}</span>
            <span class="pub-tag">${esc(capitalize(item.sexo || '—'))}</span>
            <span class="pub-tag">${esc(edadLabel)}</span>
            <span class="pub-tag">${esc(capitalize(item.tamano || item['tamaño'] || '—'))}</span>
            <span class="pub-tag pub-tag--estado-${estadoNorm}">${estadoLabel}</span>
          </div>
          <div class="pub-info-grid">
            ${zonaHTML}
            ${item.fecha ? `<div class="pub-info-item">
              <div class="pub-info-label">Fecha</div>
              <div class="pub-info-value">${esc(item.fecha)}</div>
            </div>` : ''}
          </div>
          ${descHTML}
          ${contactoHTML}
        </div>
      `;

      /* ── Galería: click en miniaturas ── */
      card.querySelectorAll('.pub-thumb').forEach(thumb => {
        thumb.addEventListener('click', function () {
          const heroImg = card.querySelector('#heroImg');
          if (heroImg) heroImg.src = this.dataset.src;
          card.querySelectorAll('.pub-thumb').forEach(t => t.classList.remove('active'));
          this.classList.add('active');
        });
      });
    })();
  </script>
</body>
</html>
