<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./editor1.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Font Awesome 5 Pro:wght@400&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Oleo Script:wght@400&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Public Sans:wght@400;500&display=swap"
    />
  </head>
  <body>
    <div class="editor">
      <section class="container7">
        <div class="symbol-container">
          <div class="symbol18"></div>
          <div class="drag3">DRAG</div>
          <div class="symbol19"></div>
        </div>
        <button class="placeholder"></button>
        <div class="background43">
          <div class="background44"></div>
          <section class="header-header3">
            <header class="background45"></header>
            <div class="header-header-row-12">
              <div class="div23">
                <div class="logo-content">
                  <div class="logo33">
                    <div class="logo3svg3">
                      <div class="frame10">
                        <img
                          class="mask-group-icon8"
                          loading="lazy"
                          alt=""
                          src="./public/Mask-group@2x.png"
                        />
                      </div>
                      <div class="logo-details">
                        <div class="div24">Alerta Patitas</div>
                      </div>
                      <img class="vector-icon5" loading="lazy" alt="" />

                      <img
                        class="vector-icon6"
                        loading="lazy"
                        alt=""
                        src="./public/Vector.svg"
                      />
                    </div>
                  </div>
                </div>
              </div>
              <div class="nav-list3">
                <div class="nav-item">
                  <div class="inicio3">Inicio</div>
                  <div class="symbol20">
                    <div class="symbol21">⌄</div>
                  </div>
                </div>
              </div>
              <div class="acerca-de-nosotros5">
                <div class="acerca-de-nosotros6">Acerca de nosotros</div>
              </div>
              <div class="paginas4">
                <div class="inicio3">Paginas </div>
              </div>
              <div class="symbol22">
                <div class="symbol21">⌄</div>
              </div>
            </div>
          </section>
          <h1 class="heading-1">Crea tu Busqueda</h1>
        </div>
      </section>
      <main class="main-content">
        <section class="pet-info-panel3">
          <div class="search-type-selector">
            <div class="tipo-de-busqueda">TIPO DE BÚSQUEDA</div>
            
            <div class="toggle-wrapper">
              <span class="opcion">Buscando</span>
              
              <label class="switch-container">
                <input type="checkbox" id="estado-mascota">
                <span class="slider"></span>
              </label>
              
              <span class="opcion">Extraviado</span>
            </div>
        
          </div>
        </section>
        <div class="main-content-row-1">
          <div class="pet-name-row2">
            <div class="form-main-row">
              <div class="form-main-row2">
                <section class="form-main-row-column-0">
<div class="left-pet-details">

            <!-- NOMBRE -->
            <div class="name-field-group">
              <label class="nombre-label" for="petName">NOMBRE:</label>
              <div class="nombre">
                <input
                  type="text"
                  id="petName"
                  class="nombre-input"
                  placeholder="Nombre"
                  autocomplete="off"
                />
              </div>
            </div>

            <!-- TIPO DE MASCOTA -->
            <div class="pet-type-field-group">
              <label class="tipo-de-mascota" for="petType">TIPO DE MASCOTA:</label>
              <div class="input3">
                <select class="pet-type-select" id="petType">
                  <option value="">Seleccionar…</option>
                  <option value="perro">Perro</option>
                  <option value="gato">Gato</option>
                  <option value="ave">Ave</option>
                  <option value="otro">Otro</option>
                </select>
                <img class="list-icon" src="./public/list-icon.svg" alt="" aria-hidden="true" />
              </div>
            </div>

            <!-- EDAD APROXIMADA -->
            <div class="age-field-group">
              <label class="edad-aproximado" for="petSex">SEXO:</label>
              <div class="input5">
                <select class="sex-select" id="petSex">
                  <option value="">Seleccionar…</option>
                  <option value="macho">Macho</option>
                  <option value="hembra">Hembra</option>
                  <option value="desconocido">Desconocido</option>
                </select>
                <img class="list-icon" src="./public/list-icon.svg" alt="" aria-hidden="true" />
              </div>
            </div>

            <div class="size-field-group">
              <label class="tamaño" for="petSize">TAMAÑO:</label>
              <div class="input6">
                <select class="size-select" id="petSize">
                  <option value="">Seleccionar…</option>
                  <option value="pequeno">Pequeño</option>
                  <option value="mediano">Mediano</option>
                  <option value="grande">Grande</option>
                </select>
                <img class="list-icon" src="./public/list-icon.svg" alt="" aria-hidden="true" />
              </div>
            </div>

          </div> 
          <section class="center-image-section" aria-label="Galería de fotos">
            
            <div class="gallery-main" id="galleryMain">
              <div id="slidesContainer">
                <div class="slide active" data-index="0">
                  <img src="./public/Background1@3x.png" alt="Foto principal" />
                </div>
              </div>
              
              <button class="nav-btn nav-btn--prev" id="btnPrev" aria-label="Foto anterior">
                <span class="nav-icon" aria-hidden="true">&larr;</span>
              </button>
              <button class="nav-btn nav-btn--next" id="btnNext" aria-label="Foto siguiente">
                <span class="nav-icon" aria-hidden="true">&rarr;</span>
              </button>
            </div>

            <div class="image-thumbnails" id="thumbnailsContainer">
              <div class="thumbnail-wrapper active" data-index="0">
                <img src="./public/Background1@3x.png" alt="Miniatura 1" />
              </div>
              <label class="thumbnail-wrapper upload-btn" for="imageUpload">
                <span class="upload-icon">🖼️⬆️</span>
              </label>
              <label class="thumbnail-wrapper upload-btn" for="imageUpload">
                <span class="upload-icon">🖼️⬆️</span>
              </label>
            </div>
            
            <input type="file" id="imageUpload" accept="image/*" style="display: none;" multiple>
          </section>
          </section>
            <!-- /gallery-main -->

            <!-- Miniaturas -->
            <div class="image-thumbnails">
              <img class="thumbnail active" data-index="0"
                   src="./public/Background1@3x.png"
                   alt="Miniatura 1" />
              <img class="thumbnail" data-index="2"
                   src="./public/Thumbnail-Pair@2x.png"
                   alt="Miniatura 3" />
              <img class="thumbnail" data-index="3"
                   src="./public/Thumbnail-Pair@2x.png"
                   alt="Miniatura 4" />
            </div>

          </section>
          <!-- /center-image-section -->
                </section>
<section class="report-container">
  <h2 class="report-title">SECTOR DE EXTRAVÍO</h2>

  <div class="location-options">
    <button class="btn btn-location">
      <img class="icon" alt="Ubicación" src="./public/imagen-51.svg" />
      <span>SELECCIÓN ÚLTIMA UBICACIÓN DE AVISTAMIENTO</span>
    </button>

    <button class="btn btn-location">
      <span>INGRESAR DIRECCIÓN/SECTOR MANUALMENTE</span>
    </button>
  </div>

  <div class="accordion">
    <div class="accordion-header">
      <div class="accordion-info">
        <img class="icon" alt="Ubicación" src="./public/imagen-51.svg" />
        <span>11 de Septiembre (El Roble)</span>
      </div>
      <img class="icon-chevron" alt="Abrir" src="./public/Chevron-down.svg" />
    </div>
  </div>

  <div class="contact-card">
    <div class="contact-header">
      <img class="icon" alt="Contacto" src="./public/imagen-4.svg" />
      <h3>DATOS DE CONTACTO</h3>
    </div>

    <div class="accordion">
      <div class="accordion-header">
        <span class="accordion-title">Title</span>
        <img class="icon-chevron" alt="Abrir" src="./public/Chevron-down.svg" />
      </div>
    </div>

    <div class="input-group">
      <textarea class="text-area" placeholder="Escribe aquí los datos personales..."></textarea>
      <button class="btn btn-save">Guardar</button>
    </div>
  </div>

  <button class="btn btn-publish">
    <span>PUBLICAR</span>
    <img class="icon" alt="Publicar" src="./public/Group-1.svg" />
  </button>
</section>

<section class="description-section">
  <div class="description-container">
    <label for="pet-description" class="descripcion-label">Descripción de la mascota:</label>
    <textarea 
      id="pet-description" 
      class="input-descripcion" 
      placeholder="Escribe aquí... (Ej: Color del pelaje, tamaño, si llevaba collar, dónde fue vista por última vez)" 
      rows="6"
    ></textarea>
  </div>
</section>
      </main>


      <div class="mask-group"></div>
      <img
        class="background-rect-icon"
        loading="lazy"
        alt=""
        src="./public/Background-Rect@2x.png"
      />

      <footer class="background55"></footer>
    </div>

    <script>
      var addressInputContainer = document.getElementById("addressInputContainer");
      if (addressInputContainer) {
        addressInputContainer.addEventListener("click", function (e) {
          window.location.href = "./repositorio-de-busqueda1.html";
        });
      }
      
      var container = document.getElementById("container");
      if (container) {
        container.addEventListener("click", function (e) {
          window.location.href = "./repositorio-de-busqueda1.html";
        });
      }
      </script>
      <script src="script-galeria.js"></script>
  </body>
</html>
